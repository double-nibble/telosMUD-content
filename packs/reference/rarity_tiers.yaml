rarity_tiers:
  - {ref: common,   order: 0, weight: 100, color: white}
  - {ref: uncommon, order: 1, weight: 30,  color: green}
  # rare tier carries the #38 slice-B DERIVED salvage rule: disenchanting a rare item rolls disenchant_arms
  # (no per-item override needed), requires a base salvaging skill of 0 (item LEVEL adds to it — a level-5
  # rare needs skill 5), and every 3 skill points ABOVE the requirement grant a bonus table roll (over-skill).
  - {ref: rare,     order: 2, weight: 5,   color: blue, salvage_table: disenchant_arms, salvage_skill: 0, salvage_bonus_step: 3}
  # epic is the TOP tier + the Phase-13.4 bind threshold (D1, binds: true): a salvage component of this tier
  # is bound on creation — the legendary-essence sink that keeps the top end un-buyable. Lower tiers stay
  # tradeable (binds defaults false), feeding the component market.
  - {ref: epic,     order: 3, weight: 1,   color: purple, binds: true}

# loot_tables: independent rolls a mob drops from on death (Phase 12.1). goblin_loot gives a guaranteed
# common torch to every eligible looter plus an independent 25% chance at a rare sword (personal loot).
# affix_defs: content-defined NAMED affixes (#37). A shared affix is authored once here and referenced by ref
# from a loot entry's quality pool (below), so editing the range propagates to every drop on reload — instead
# of the value being baked into each inline pool. `of_the_bear` is referenced by the goblin sword; `of_the_owl`
# stands alone (a pool may reference it later). A pool that inlines attr/min/max still works (the pre-#37 form).
