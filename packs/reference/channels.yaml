channels:
  # gossip: the OOC global chatter channel. Open to everyone (no access predicate), default on. The
  # format renders "[Gossip] <author>: <text>"; the player's text is the $t DATA arg (a `$`/ANSI in it
  # is literal — it can never forge a "[Gossip] Admin:" prefix or inject a control sequence).
  - ref: gossip
    name: Gossip
    words: [gossip, gos]
    color: ""
    format: "[$channel] $name: $t"
    default_on: true
    history: 20
  # newbie: the help/newbie channel. Also open + default-on; a distinct verb/format demonstrates the
  # multi-channel shape. A pack could gate this (e.g. require a "helper" flag or a level floor) via
  # `access`; the demo keeps it open so the journey tests need no flag setup.
  - ref: newbie
    name: Newbie
    words: [newbie, newb]
    format: "[$channel] $name: $t"
    default_on: true
    history: 20
  # guild: a RESTRICTED channel (Phase 8.6 hear-filter makes this safe to ship). access.require_flag
  # gates BOTH speak (channel.go canSpeak) and HEAR (canHear, the 8.6 receiver filter) — only an entity
  # carrying the "guildmember" flag may speak on it OR receive its lines, so a non-member never sees guild
  # chatter even on a shared bus. default_on false: a fresh character is NOT auto-subscribed (and could
  # not hear it anyway). HOW TO GRANT THE FLAG: there is no in-game flag-grant verb (a real gap — see the
  # report); the "guildmember" flag is set out-of-band on a character save (StateJSON `flags`), exactly as
  # the "pvp" consent flag is. A test grants it directly via setFlag(e, "guildmember", true) — see
  # TestChannelAccessDenied's pattern. This closes the "no restricted channel until 8.6" guardrail.
  - ref: guild
    name: Guild
    words: [guild, gu]
    format: "[$channel] $name: $t"
    access:
      require_flag: guildmember
    default_on: false
    history: 20

# regions: content-defined groupings of member zones (Phase 10.3, docs/WORLD-EVENTS.md §1). A region's
# supra-zone state is owned by a region director; member zones keep a cached read-replica of it and signal
# UP to the director (10.3b/c). A region may span several zones (region ≠ shard). The demo groups the two
# overworld zones into a "heartlands" region; the crypt is left region-less (it has only the world scope).
