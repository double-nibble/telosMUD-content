# The `demo` content pack MANIFEST — the midgaard + darkwood + crypt world, originally
# transcribed VERBATIM from the old internal/world/world.go newDemoZone()/defineTorch()/…
# Go authoring. This pack is authored as a DIRECTORY TREE (#52/#53): this pack.yaml plus a
# file per pack-global section (attributes.yaml, abilities.yaml, …) and a file per zone under
# zones/. The loader (internal/content/packtree.go) merges the tree into one pack — the same
# content the unit tests load (embedded via internal/content/demo.go) and `make seed` imports
# into the Postgres `pack='demo'` rows for the live stack.
#
# HARD CONSTRAINT (Phase 4.1): the rendered demo world must stay byte-identical — room
# names, long descriptions, exit display order, item keywords/short/long, and the market
# floor item placements. The parity test (content_parity_test.go) diffs the prototypes this
# pack produces against newDemoZone's output before that authoring was deleted; keep it green
# when editing any file in this tree.
#
# All three zones ship together so the cross-zone exit market --north--> darkwood:room:grove
# satisfies the exits.to_room FK when seeded.

pack: reference
default_combat: melee
