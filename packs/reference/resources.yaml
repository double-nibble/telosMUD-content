resources:
  # hp is VITAL: at 0 = death. The on_depleted op-list is the [G-D] death hook (Phase 6.3b): the engine
  # runs it on the dying entity BEFORE die() drops combat / builds the corpse, then proceeds to death.
  # Here it is a pure narration (the engine's own "$n is DEAD!" room line still fires after). Its max is
  # the derived max_hp attribute, so anything that raises constitution/level/max_hp raises the cap.
  - ref: hp
    display_name: Health
    max_attr: max_hp
    vital: true
    regen: 1
    gauge: true
    on_depleted:
      - {op: act, to: room, text: "$n collapses, lifeless."}
  - {ref: mana, display_name: Mana,   max_attr: max_mana, vital: false, regen: 1, gauge: true}
  # reactions: the per-round REACTION budget ([G9], Phase 6.4b) AND the carrier of the opportunity-attack
  # handler. `per_round: true` makes the round driver refill it to max (max_reactions) at the START of
  # every combat round, so a reactor gets a bounded number of reactions/round and a spent one does not
  # refill until next round — the SECOND flee in a round provokes nothing. on_event[OnLeaveRoom] is the
  # OPPORTUNITY ATTACK: when an engaged foe flees the room, the engine fires OnLeaveRoom about THIS
  # reactor (subject), with the fleer bound as `other`. The handler (a) checks a reaction is available
  # (`if reactions >= 1`), then (b) SPENDS it (modify_resource self reactions -1) and (c) lands a granted,
  # GATED swing on the fleer (deal_damage with target: other -> the same dealDamage/guardHarmful funnel
  # every harm uses, so a non-consenting player is NOT hit). Pure CONTENT — the engine names no OA.
  - ref: reactions
    display_name: Reactions
    max_attr: max_reactions
    vital: false
    per_round: true
    on_event:
      OnLeaveRoom:
        - op: if
          resource_min: {resource: reactions, min: 1}
          then:
            - {op: modify_resource, resource: reactions, amount: -1}
            - {op: act, to: actor, target: other, text: "$N tries to flee — you lunge with an opportunity attack!"}
            - {op: deal_damage, target: other, type: slash, dice_num: 1, dice_size: 6, bonus: ["attr", "$actor.strength_bonus"]}

  # --- sanity: the #408 exemplar. A NON-VITAL secondary pool, and non-vital is the whole point (#406):
  # at 0 the character is PERMANENTLY BROKEN, not dead. Marking it `vital` would make it lethal under
  # #71's any-vital-lethal policy, which is the wrong outcome for every system that models a mind.
  #
  # It is INERT for the existing world: max_sanity derives from `pow`, whose default base is 0, so every
  # pre-existing player and mob has no capacity here and is immune to horror damage by construction.
  #
  # regen 0: sanity does NOT come back on its own — recovery is an authored act, which is the d100-family
  # rule and also keeps the pool from silently healing out of the `insane` state.
  - ref: sanity
    display_name: Sanity
    max_attr: max_sanity
    vital: false
    regen: 0
    gauge: true
    # THE #406 SURFACE: a non-vital pool bottoming out runs its OWN op-list and never reaches die().
    # The hook is LEVEL-triggered — every blow that leaves the pool at 0 runs it — so the first op is the
    # content-side idempotency guard the DTO doc prescribes: narrate and apply once, then stay quiet.
    # Note what is NOT here: any rewarding op. A pool held at 0 can be hit on purpose, so a grant in this
    # list would be farmable (lintDepletionHookGrants warns if you try).
    on_depleted:
      - op: if
        has_affect: insane
        then:
          - {op: send, text: "The dark tide closes over what is left of you."}
        else:
          - {op: act, to: room, text: "$n's eyes go flat and empty. Something behind them has stopped."}
          - {op: send, text: "You can no longer hold the shape of the world in your head."}
          - {op: apply_affect, affect: insane, harmful: true}
