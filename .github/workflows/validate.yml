# Validate a content change (the PR merge gate). Builds telos-pull from the engine repo (the engine
# module has a go.mod `replace`, so `go install` can't fetch it — it must be built from a checkout)
# and runs `telos-pull --check`, which verifies the committed manifest's content_hash against the
# packs/ tree, that packs[] matches the tree, that every pack parses, and that no pack ships a
# reserved core: ref. If you edit packs/ without regenerating the manifest, --check fails on the
# hash mismatch — so the manifest is always kept in step.
name: validate
on:
  pull_request:
  push:
    branches-ignore: [main] # main is validated + tagged by publish.yml
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # telos-pull resolves HEAD via go-git; needs full history
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build telos-pull from the engine repo
        run: |
          git clone --depth 1 https://github.com/double-nibble/telosMUD.git /tmp/engine
          (cd /tmp/engine && go build -o /tmp/telos-pull ./cmd/telos-pull)
      - name: telos-pull --check
        env:
          TELOS_CONTENT_URL: ${{ github.workspace }}
          TELOS_CONTENT_CACHE: /tmp/telos-content-cache
        run: |
          TELOS_CONTENT_VERSION="$(git rev-parse HEAD)" /tmp/telos-pull --check
